<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>amaze</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #canvas {
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      font-family: 'Cascadia Mono', Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--hud-text, #8aaa8a);
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid var(--hud-border, rgba(100, 140, 100, 0.25));
      padding: 10px 14px;
      pointer-events: none;
      min-width: 190px;
      user-select: none;
    }
    .hud-label {
      color: var(--hud-label, #3d5c3d);
      display: inline-block;
      width: 90px;
    }
    .hud-sep {
      border: none;
      border-top: 1px solid var(--hud-sep, rgba(100, 140, 100, 0.18));
      margin: 6px 0;
    }
    .hud-prev {
      margin-top: 2px;
    }
    .hud-prev-row {
      display: flex;
      gap: 8px;
      padding-left: 90px;
    }
    .hud-prev-name {
      display: inline-block;
      width: 120px;
    }
    #hud-solver-time {
      display: inline-block;
      width: 44px;
      text-align: right;
    }
    .hud-prev-time {
      width: 44px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="canvas"></canvas>
  </div>
  <div id="hud">
    <div>
      <span class="hud-label">Theme</span><span id="hud-theme">—</span>
    </div>
    <div>
      <span class="hud-label">Generator</span><span id="hud-gen">—</span>
    </div>
    <div class="hud-sep"></div>
    <div>
      <span class="hud-label">Solver</span><span id="hud-solver-name" style="display:inline-block;width:120px">—</span><span id="hud-solver-time" style="margin-left:8px">—</span>
    </div>
    <div id="hud-prev" class="hud-prev"></div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
